<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>患者説明動画 | SKCS</title>
<link rel="manifest" href="/manifest.json">
  <!-- Plan A (2026-04-22): 動的manifest script削除 -->
  <!-- Plan C (2026-04-23): PIN解除状態をsessionStorageで保持 -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
  <link rel="shortcut icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f4f8;--surface:#fff;--accent:#1a5fa8;--accent-light:#d6e8f7;--accent-dark:#0d3d6b;--text:#1a2636;--muted:#5a7a99;--border:#c8d8e8;--green:#2e8b57;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Noto Sans JP',sans-serif;color:var(--text);overflow:hidden;}
/* PIN */
#pin{position:fixed;inset:0;z-index:999;background:var(--accent-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#pin.off{display:none;}
.pt{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:600;color:#fff;}
.ps{font-size:13px;color:rgba(255,255,255,.6);}
.pd{display:flex;gap:10px;}
.pd span{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.3);}
.pd span.on{background:#fff;}
.pe{font-size:12px;color:#f87171;height:16px;}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px;}
.pb{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:15px;color:#fff;font-size:20px;font-weight:500;cursor:pointer;text-align:center;font-family:'Noto Sans JP',sans-serif;}
.pb:active{background:rgba(255,255,255,.3);}
/* MAIN */
#main{position:fixed;inset:0;display:flex;flex-direction:column;}
/* Header */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.hico{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hico svg{width:18px;height:18px;fill:#fff;}
.htitle{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:600;color:var(--accent-dark);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hbtns{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.hbtn{display:flex;align-items:center;gap:4px;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;}
.dl-btn{background:#dcfce7;border-color:var(--green);color:var(--green);}
.sy-btn{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.sy-btn.spin svg{animation:spin 1s linear infinite;}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;}
.dot.on{background:var(--green);}
.dot.off{background:#e8a020;}
@keyframes spin{to{transform:rotate(360deg);}}
/* DL progress */
.dlp{display:none;align-items:center;gap:8px;padding:6px 14px;background:var(--accent-light);border-bottom:1px solid var(--accent);font-size:11px;color:var(--accent);flex-shrink:0;}
.dlp.show{display:flex;}
.dlbw{flex:1;height:3px;background:rgba(26,95,168,.15);border-radius:2px;overflow:hidden;}
.dlb{height:100%;background:var(--accent);width:0%;transition:width .3s;border-radius:2px;}
/* Tabs */
.tabs{display:flex;gap:7px;padding:10px 14px 0;overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:var(--bg);}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:6px 14px;border-radius:18px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff;}
/* Video list */
.vlist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px 20px;display:flex;flex-direction:column;gap:8px;}
/* Card */
.card{background:#fff;border-radius:12px;border:1.5px solid var(--border);padding:14px;cursor:pointer;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.card:active{background:var(--accent-light);border-color:var(--accent);}
.cico{width:40px;height:40px;background:var(--accent-light);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cico svg{width:20px;height:20px;fill:var(--accent);}
.cbody{flex:1;min-width:0;}
.ctitle{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cmeta{font-size:11px;color:var(--muted);margin-top:2px;}
.cbadge{font-size:10px;padding:2px 7px;border-radius:5px;display:none;flex-shrink:0;}
.cbadge.saved{display:block;background:#dcfce7;color:var(--green);}
.cbadge.playing{display:block;background:var(--accent-light);color:var(--accent);}
.carr{flex-shrink:0;color:var(--muted);}
/* Empty */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty svg{width:40px;height:40px;opacity:.3;margin-bottom:10px;}
/* Player */
#player{position:fixed;inset:0;background:#000;display:none;flex-direction:column;z-index:100;}
#player.on{display:flex;}
.phdr{background:rgba(0,0,0,.85);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.pbk{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 12px;color:#fff;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.ptitle{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pvc{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;}
#vp{width:100%;height:100%;object-fit:contain;}
#vdo{width:100%;height:100%;}
#vdo iframe{width:100%;height:100%;border:none;}
.lov{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#fff;}
.lov.off{display:none;}
.sp{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
/* Loading */
#loading{position:fixed;inset:0;background:var(--accent-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:200;}
#loading.off{display:none;}
.ll{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:600;color:#fff;}
.lb{width:160px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.lbf{height:100%;background:#fff;animation:lb 2s ease-out forwards;}
@keyframes lb{from{width:0}to{width:100%}}
/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--text);color:#fff;padding:9px 18px;border-radius:9px;font-size:12px;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
@media(min-width:600px){
.hdr{padding:12px 28px;}
.htitle{font-size:18px;}
.tabs{padding:14px 28px 0;gap:9px;}
.tab{font-size:13px;padding:7px 16px;}
.vlist{padding:14px 28px 24px;gap:10px;}
.card{padding:16px 18px;}
.ctitle{font-size:16px;}
}
</style>
</head>
<body>

<!-- PIN -->
<div id="pin">
<div class="pt">患者説明動画</div>
<div class="ps">PINコードを入力してください</div>
<div class="pd" id="pd"><span></span><span></span><span></span><span></span></div>
<div class="pe" id="pe"></div>
<div class="pg">
<button class="pb" onclick="pi('1')">1</button><button class="pb" onclick="pi('2')">2</button><button class="pb" onclick="pi('3')">3</button>
<button class="pb" onclick="pi('4')">4</button><button class="pb" onclick="pi('5')">5</button><button class="pb" onclick="pi('6')">6</button>
<button class="pb" onclick="pi('7')">7</button><button class="pb" onclick="pi('8')">8</button><button class="pb" onclick="pi('9')">9</button>
<button class="pb" onclick="pc()" style="font-size:12px">クリア</button><button class="pb" onclick="pi('0')">0</button><button class="pb" onclick="pd2()" style="font-size:15px">⌫</button>
</div>
</div>

<!-- Loading -->
<div id="loading"><div class="ll">患者説明動画</div><div style="font-size:12px;color:rgba(255,255,255,.6)">読み込んでいます…</div><div class="lb"><div class="lbf"></div></div></div>

<!-- Main -->
<div id="main">
<div class="hdr">
<div class="hico"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
<div class="htitle">患者説明動画</div>
<div class="hbtns">
<button class="hbtn dl-btn" id="dlBtn" onclick="bulkDl()">
<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
<span id="dlTxt">一括保存</span>
</button>
<button class="hbtn sy-btn" id="syBtn" onclick="sync()">
<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
更新
</button>
<div class="dot" id="dot"></div>
</div>
</div>
<div class="dlp" id="dlp"><div class="dlbw"><div class="dlb" id="dlb"></div></div><div id="dlptxt" style="white-space:nowrap">準備中…</div></div>
<div class="tabs" id="cat"></div>
<div class="tabs" id="typ"></div>
<div class="vlist" id="vlist"></div>
</div>

<!-- Player -->
<div id="player">
<div class="phdr">
<button class="pbk" onclick="back()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>戻る</button>
<div class="ptitle" id="ptitle"></div>
</div>
<div class="pvc">
<video id="vp" controls playsinline preload="auto" style="display:none"></video>
<div id="vdo" style="display:none"></div>
<div class="lov" id="lov"><div class="sp"></div><div style="font-size:13px">読み込み中…</div></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const PIN='1159',API='/api/notion',_HP=new URLSearchParams(location.search).get('hospital')||'',CK='kv1-'+_HP;
let videos=[],cat='all',typ='all',pv='',dlg=false;

// PIN
function pi(d){if(pv.length>=4)return;pv+=d;upd();if(pv.length===4)setTimeout(cp,200);}
function pd2(){pv=pv.slice(0,-1);upd();}
function pc(){pv='';upd();document.getElementById('pe').textContent='';}
function upd(){const ds=document.getElementById('pd').children;for(let i=0;i<4;i++)ds[i].classList.toggle('on',i<pv.length);}
function cp(){if(pv===PIN){document.getElementById('pin').classList.add('off');try{sessionStorage.setItem('kiosk_unlocked','1');}catch(e){}}else{document.getElementById('pe').textContent='PINコードが正しくありません';pv='';upd();}}

// Init
document.addEventListener('DOMContentLoaded',async()=>{
  // Plan C: PIN解除状態を復元（sessionStorage）
  // リロード発生時もPIN画面に戻らないようにする
  // sessionStorageはタブを閉じる・端末再起動でクリアされるのでセキュリティ担保
  try{if(sessionStorage.getItem('kiosk_unlocked')==='1'){document.getElementById('pin').classList.add('off');}}catch(e){}
  updot();window.addEventListener('online',updot);window.addEventListener('offline',updot);
  const c=lc();if(c&&c.length){videos=c;render();}
  if(navigator.onLine){await sync(true);}else{hide();if(!c||!c.length)toast('オフライン：更新ボタンを押してください');}
});

const HOSPITAL_ID = _HP || null;

async function sync(s=false){
  const b=document.getElementById('syBtn');b.classList.add('spin');
  if(!s)toast('更新中…');
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({hospitalId:HOSPITAL_ID})});
    if(!r.ok)throw new Error();
    const d=await r.json();
    videos=d.videos||[];sc(videos);render();hide();
    if(!s)toast(videos.length+'件の動画を更新しました');
  }catch(e){hide();if(!s)toast('更新に失敗しました');}
  finally{b.classList.remove('spin');}
}

function gtype(v){
  const t=(v.title||'').toLowerCase(),l=(v.layer||'').toLowerCase();
  if(t.includes('概要')||t.includes('overview'))return 'overview';
  if(t.includes('詳細')||t.includes('detail')||l.includes('layer2')||l.includes('同意'))return 'detail';
  return 'other';
}
const TL={'overview':'概要版(overview)','detail':'詳細版(detail)','other':'その他'};

function render(){
  // カテゴリタブ
  const cats=['all',...new Set(videos.map(v=>v.category).filter(Boolean))];
  document.getElementById('cat').innerHTML=cats.map(c=>`<button class="tab${c===cat?' on':''}" onclick="setCat('${c}')">${c==='all'?'すべて':c}</button>`).join('');
  // 種別タブ
  const fv=cat==='all'?videos:videos.filter(v=>v.category===cat);
  const typs=['all',...new Set(fv.map(gtype))];
  document.getElementById('typ').innerHTML=typs.map(t=>`<button class="tab${t===typ?' on':''}" onclick="setTyp('${t}')">${t==='all'?'すべて':(TL[t]||t)}</button>`).join('');
  // リスト
  let fv2=cat==='all'?videos:videos.filter(v=>v.category===cat);
  if(typ!=='all')fv2=fv2.filter(v=>gtype(v)===typ);
  const el=document.getElementById('vlist');
  if(!fv2.length){el.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><div>動画がありません</div></div>';return;}
  // 動画データをvideoMapに保存してonclickから参照
window.videoMap = {};
fv2.forEach(v => { window.videoMap[v.id] = v; });

el.innerHTML=fv2.map(v=>`
<div class="card" onclick="playById('${v.id}')">
<div class="cico"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
<div class="cbody">
<div class="ctitle">${e(v.title)}</div>
<div class="cmeta">${e(v.category||'')}${v.layer?' · '+e(v.layer):''}  · ${e(v.lang||'日本語')}</div>
</div>
<div class="cbadge" id="cb-${v.id}"></div>
<div class="carr"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
</div>`).join('');
  fv2.forEach(v=>chk(v.id,v.videoUrl));
}

function setCat(c){cat=c;typ='all';render();}
function setTyp(t){typ=t;render();}

function playById(id){
  const v = window.videoMap && window.videoMap[id];
  if(!v){toast('動画が見つかりません');return;}
  play(id, v.title, v.videoUrl||'', v.vdoId||'');
}

async function play(id,title,url,vdoId){
  document.getElementById('ptitle').textContent=title;
  const lov=document.getElementById('lov'),vp=document.getElementById('vp'),vdo=document.getElementById('vdo');
  lov.classList.remove('off');
  document.getElementById('player').classList.add('on');
  const cb=document.getElementById('cb-'+id);
  if(cb){cb.className='cbadge playing';cb.textContent='再生中';}
  if(vdoId){
    vp.style.display='none';vdo.style.display='block';
    try{
      const r=await fetch('/api/vdocipher',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId:vdoId})});
      if(!r.ok)throw new Error();
      const {otp,playbackInfo}=await r.json();
      vdo.innerHTML='<iframe src="https://player.vdocipher.com/v2/?otp='+otp+'&playbackInfo='+playbackInfo+'&primaryColor=1a5fa8" allowfullscreen allow="encrypted-media"></iframe>';
      lov.classList.add('off');
    }catch(err){lov.classList.add('off');toast('動画の読み込みに失敗しました');}
  }else if(url){
    vdo.style.display='none';vp.style.display='block';
    vp.src=url;
    vp.oncanplay=()=>lov.classList.add('off');
    vp.onerror=()=>{lov.classList.add('off');toast('動画の読み込みに失敗しました');};
    vp.play().catch(()=>{});
  }else{toast('動画が設定されていません');document.getElementById('player').classList.remove('on');}
}

function back(){
  const vp=document.getElementById('vp');vp.pause();vp.src='';
  document.getElementById('vdo').innerHTML='';
  document.getElementById('player').classList.remove('on');
  videos.forEach(v=>chk(v.id,v.videoUrl));
}

async function bulkDl(){
  if(dlg||!navigator.onLine){toast('Wi-Fi接続中に実行してください');return;}
  const vs=videos.filter(v=>v.videoUrl);
  if(!vs.length){toast('保存できる動画がありません');return;}
  dlg=true;
  const btn=document.getElementById('dlBtn'),prog=document.getElementById('dlp'),bar=document.getElementById('dlb'),txt=document.getElementById('dlptxt');
  btn.style.opacity='.6';prog.classList.add('show');
  const hv=document.createElement('video');hv.muted=true;hv.preload='auto';
  hv.style.cssText='position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;';
  document.body.appendChild(hv);
  let done=0;
  for(const v of vs){
    txt.textContent=v.title+'（'+(done+1)+'/'+vs.length+'）';
    bar.style.width=(done/vs.length*100)+'%';
    const cb=document.getElementById('cb-'+v.id);
    if(cb){cb.className='cbadge playing';cb.textContent='保存中…';}
    await new Promise(res=>{
      hv.src=v.videoUrl;let ok=false;
      const fin=()=>{if(!ok){ok=true;if(cb){cb.className='cbadge saved';cb.textContent='保存済';}res();}};
      hv.oncanplaythrough=fin;setTimeout(fin,30000);hv.load();
    });
    done++;
  }
  hv.remove();bar.style.width='100%';txt.textContent='✅ '+done+'件すべて保存完了！';
  btn.style.opacity='1';document.getElementById('dlTxt').textContent='保存済み ✅';
  setTimeout(()=>{prog.classList.remove('show');dlg=false;},3000);
  toast(done+'件の動画を保存しました');
}

async function chk(id,url){
  if(!url||!('caches' in window))return;
  const c=await caches.open('kiosk-v1');const m=await c.match(url);
  const cb=document.getElementById('cb-'+id);
  if(m&&cb){cb.className='cbadge saved';cb.textContent='保存済';}
}

function sc(v){try{localStorage.setItem(CK,JSON.stringify(v));}catch(e){}}
function lc(){try{return JSON.parse(localStorage.getItem(CK));}catch(e){return null;}}
function hide(){document.getElementById('loading').classList.add('off');}
function updot(){const d=document.getElementById('dot');d.className='dot '+(navigator.onLine?'on':'off');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function e(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
</script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
</body>
</html>
